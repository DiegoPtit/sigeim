services:
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./sigeim:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=sigeim_db
      - DB_USER=sigeim_user
      - DB_PASS=sigeim_pass
    depends_on:
      - db

  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=sigeim_db
      - MYSQL_USER=sigeim_user
      - MYSQL_PASSWORD=sigeim_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sigeim/database/migrations/01_initial_schema.sql:/docker-entrypoint-initdb.d/01_initial_schema.sql:ro

volumes:
  db_data:
  storage_data:
